strategies:
  cross_sectional_carry:
    type: "cross_sectional"
    factor: "carry"
    long_n: 3
    short_n: 3
    rebalance: "weekly"

  multi_factor:
    type: "cross_sectional"
    factor: "composite"
    long_n: 3
    short_n: 3
    rebalance: "weekly"

  sector_neutral:
    type: "cross_sectional"
    factor: "composite"
    neutral_by: "sector"
    rebalance: "weekly"

  time_series_carry:
    type: "time_series"
    factor: "carry"
    threshold_z: 0.0
    rebalance: "weekly"

  calendar_spread:
    type: "calendar_spread"
    near_tenor: 1
    far_tenor: 6
    rebalance: "weekly"

  regime_conditioned:
    type: "regime_conditioned"
    regime_proxy: "vix"
    vix_thresholds: [15, 25]
    weights_by_regime:
      calm:
        carry: 0.40
        slope: 0.25
        momentum: 0.15
        curvature: 0.10
        inventory: 0.10
      moderate:
        carry: 0.25
        slope: 0.20
        momentum: 0.25
        curvature: 0.15
        inventory: 0.15
      turbulent:
        carry: 0.10
        slope: 0.15
        momentum: 0.35
        curvature: 0.20
        inventory: 0.20

constraints:
  vol_target: 0.10
  max_position_weight: 0.20
  max_sector_weight: 0.40
  max_leverage: 2.0

execution:
  rebalance_day: "friday"
  lag_days: 1
